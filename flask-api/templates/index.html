<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>六壬时课 · 在线起卦</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0d0d1a;
  --card:#13132a;
  --card2:#1a1a38;
  --border:#2a2a4a;
  --gold:#d4a853;
  --gold2:#e8c878;
  --text:#e8d5a3;
  --sub:#8b7d6b;
  --green:#7bcfa8;
  --red:#e87a7a;
  --blue:#7aade8;
  --purple:#a87ae8;
  --radius:12px;
}
body{background:var(--bg);color:var(--text);font-family:'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;min-height:100vh;padding:20px;
  background-image:radial-gradient(ellipse at 20% 0%,rgba(212,168,83,0.06) 0%,transparent 50%),
    radial-gradient(ellipse at 80% 100%,rgba(123,207,168,0.05) 0%,transparent 50%);
}
.container{max-width:900px;margin:0 auto}

/* === 头部 === */
.header{text-align:center;padding:24px 0 16px}
.header h1{font-size:32px;font-weight:300;color:var(--gold);letter-spacing:8px;margin-bottom:8px}
.header h1 span{display:inline-block;margin:0 4px}
.header .subtitle{color:var(--sub);font-size:13px;letter-spacing:3px}
.header .divider{width:60px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:12px auto 0}

/* === 输入区 === */
.input-panel{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:20px 24px;
  margin-bottom:16px;
  box-shadow:0 4px 24px rgba(0,0,0,0.3);
}
.input-row{display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end;margin-bottom:14px}
.field{flex:1;min-width:80px}
.field label{display:block;font-size:11px;color:var(--sub);margin-bottom:5px;letter-spacing:1px}
.field select,.field input{
  width:100%;padding:9px 12px;
  background:var(--card2);
  border:1px solid var(--border);
  border-radius:8px;
  color:var(--text);
  font-size:14px;
  transition:border-color 0.2s;
}
.field select:focus,.field input:focus{outline:none;border-color:var(--gold)}
.field select option{background:#1a1a38}
.btn-row{display:flex;gap:10px;justify-content:center}
.btn{
  padding:9px 24px;
  border:1px solid var(--gold);
  background:transparent;
  color:var(--gold);
  border-radius:8px;
  cursor:pointer;
  font-size:14px;
  letter-spacing:2px;
  transition:all 0.2s;
}
.btn:hover{background:rgba(212,168,83,0.15)}
.btn-primary{background:var(--gold);color:#0d0d1a;font-weight:600}
.btn-primary:hover{background:var(--gold2);box-shadow:0 0 20px rgba(212,168,83,0.3)}

/* === 结果区 === */
.result{}

/* === 基本信息卡 === */
.info-card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:16px 20px;
  margin-bottom:12px;
  display:none;
}
.info-grid{display:flex;flex-wrap:wrap;gap:8px}
.info-tag{
  padding:6px 14px;
  background:var(--card2);
  border:1px solid var(--border);
  border-radius:20px;
  font-size:13px;
  display:flex;align-items:center;gap:6px;
}
.info-tag .lbl{color:var(--sub);font-size:11px}
.info-tag .val{color:var(--gold);font-weight:600}

/* === 天地盘 === */
.panels{display:none}
.tp-card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:16px;
  margin-bottom:12px;
}
.tp-card h3{color:var(--gold);font-size:13px;font-weight:400;letter-spacing:2px;margin-bottom:12px;text-align:center}
.tp-row{display:flex;gap:12px;flex-wrap:wrap}
.tp-box{flex:1;min-width:160px;text-align:center}
.tp-grid{display:inline-grid;grid-template-columns:repeat(4,50px);grid-template-rows:repeat(4,50px);gap:3px;margin-top:8px}
.tp-cell{
  display:flex;align-items:center;justify-content:center;
  background:var(--card2);
  border:1px solid var(--border);
  border-radius:6px;
  font-size:17px;font-weight:600;
  transition:all 0.2s;
}
.tp-cell:hover{border-color:var(--gold);transform:scale(1.05)}
.tp-cell.bk{visibility:hidden}
.tp-cell.tc{color:var(--gold2);font-size:15px}

/* === 四课 === */
.sk-card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:16px;
  margin-bottom:12px;
  display:none;
}
.sk-card h3{color:var(--gold);font-size:13px;font-weight:400;letter-spacing:2px;margin-bottom:14px}
.sk-table{width:100%;border-collapse:separate;border-spacing:0;overflow:hidden;border-radius:8px;border:1px solid var(--border)}
.sk-table th{
  background:var(--card2);color:var(--gold);padding:10px 8px;
  font-size:11px;font-weight:400;letter-spacing:1px;
  border-bottom:1px solid var(--border);
}
.sk-table td{
  padding:12px 10px;text-align:center;font-size:14px;
  border-bottom:1px solid var(--border);
  background:var(--card);
}
.sk-table tr:last-child td{border-bottom:none}
.sk-table .课名{color:var(--sub);font-size:12px;width:80px}
.sk-table .地支{font-size:20px;font-weight:700;color:var(--gold2)}
.sk-table .神将{font-size:16px}
.sk-table .关系{padding:4px 8px;border-radius:10px;font-size:11px}
.sk-table .关系.贼{background:rgba(232,122,122,0.15);color:var(--red)}
.sk-table .关系.克{background:rgba(123,207,168,0.15);color:var(--green)}
.sk-table .关系.无{background:rgba(139,125,107,0.1);color:var(--sub)}

/* === 三传 === */
.sc-card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:16px;
  margin-bottom:12px;
  display:none;
}
.sc-header{margin-bottom:16px;text-align:center}
.sc-header .课体标签{
  display:inline-block;
  padding:6px 20px;
  background:linear-gradient(135deg,rgba(212,168,83,0.2),rgba(212,168,83,0.1));
  border:1px solid var(--gold);
  border-radius:20px;
  color:var(--gold);
  font-size:14px;
  letter-spacing:3px;
  margin-bottom:8px;
}
.sc-header .课体说明{color:var(--sub);font-size:12px;line-height:1.8}
.sc-flow{display:flex;align-items:center;justify-content:center;gap:12px;flex-wrap:wrap}
.sc-chuan{
  display:flex;flex-direction:column;align-items:center;
  background:var(--card2);
  border:2px solid var(--border);
  border-radius:12px;
  padding:14px 20px;
  min-width:90px;
  transition:all 0.2s;
}
.sc-chuan:hover{border-color:var(--gold);transform:translateY(-2px)}
.sc-chuan.da-ji{border-color:var(--green);background:rgba(123,207,168,0.08)}
.sc-chuan.xiong{border-color:var(--red);background:rgba(232,122,122,0.08)}
.sc-chuan.zhong{border-color:var(--gold);background:rgba(212,168,83,0.08)}
.sc-chuan .阶段{font-size:10px;color:var(--sub);margin-bottom:6px;letter-spacing:1px}
.sc-chuan .地支{font-size:28px;font-weight:700;color:var(--text)}
.sc-chuan .神将{font-size:14px;margin-top:4px}
.sc-chuan .吉凶{
  font-size:10px;padding:2px 8px;border-radius:10px;margin-top:4px;
}
.sc-chuan.da-ji .吉凶{background:rgba(123,207,168,0.2);color:var(--green)}
.sc-chuan.xiong .吉凶{background:rgba(232,122,122,0.2);color:var(--red)}
.sc-chuan.zhong .吉凶{background:rgba(212,168,83,0.2);color:var(--gold)}
.sc-arrow{font-size:22px;color:var(--sub)}

/* === 天官全盘 === */
.tgm-card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:16px;
  margin-bottom:12px;
  display:none;
}
.tgm-toggle{
  color:var(--gold);font-size:13px;cursor:pointer;
  display:flex;align-items:center;gap:8px;letter-spacing:1px;
  padding:4px 0;
}
.tgm-toggle:hover{color:var(--gold2)}
.tgm-toggle .arr{transition:transform 0.2s;font-size:11px}
.tgm-toggle.open .arr{transform:rotate(90deg)}
.tgm-content{display:none;margin-top:14px}
.tgm-content.open{display:block}
.tgm-pan{text-align:center;margin-top:10px}
.tgm-pan .tp-grid{display:inline-grid}
.tgm-cell{font-size:13px!important}

/* === 断课 === */
.jx-card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:20px 24px;
  margin-bottom:12px;
  display:none;
}
.jx-card h3{color:var(--gold);font-size:13px;font-weight:400;letter-spacing:2px;margin-bottom:16px}
.jx-content{
  background:var(--card2);
  border:1px solid var(--border);
  border-radius:8px;
  padding:18px 20px;
  font-size:13px;
  line-height:2;  /* 行距2倍 */
  white-space:pre-wrap;
  color:var(--text);
}
.jx-content .section{display:block;margin-bottom:8px}
.jx-content .section:last-child{margin-bottom:0}
.jx-label{color:var(--gold);font-weight:600}
.jx-line{color:var(--sub)}

/* === Footer === */
.footer{
  text-align:center;
  padding:24px 0 16px;
  color:var(--sub);
  font-size:12px;
  line-height:2;
}
.footer .name{color:var(--gold);font-size:14px;letter-spacing:4px;margin-bottom:4px}
.footer .desc{font-size:11px;letter-spacing:1px}
.footer .line{width:40px;height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent);margin:10px auto}

/* === 空状态 === */
.empty{text-align:center;padding:40px;color:var(--sub);font-size:13px;letter-spacing:1px}

/* === 动画 === */
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn 0.3s ease-out}
</style>
</head>
<body>
<div class="container">

<!-- 头部 -->
<div class="header">
  <h1><span>六</span><span>壬</span><span>时</span><span>课</span></h1>
  <p class="subtitle">月将加时 · 四课三传 · 天官贵神</p>
  <div class="divider"></div>
</div>

<!-- 输入 -->
<div class="input-panel">
  <div class="input-row">
    <div class="field"><label>年</label><select id="year"></select></div>
    <div class="field"><label>月</label><select id="month"></select></div>
    <div class="field"><label>日</label><select id="day"></select></div>
    <div class="field"><label>时</label><select id="hour"></select></div>
    <div class="field"><label>月将</label>
      <select id="yj">
        <option value="auto">自动</option>
        <option value="子">子 · 神后</option>
        <option value="丑">丑 · 大吉</option>
        <option value="寅">寅 · 功曹</option>
        <option value="卯">卯 · 太冲</option>
        <option value="辰">辰 · 天罡</option>
        <option value="巳">巳 · 太乙</option>
        <option value="午">午 · 胜光</option>
        <option value="未">未 · 小吉</option>
        <option value="申">申 · 传送</option>
        <option value="酉">酉 · 从魁</option>
        <option value="戌">戌 · 河魁</option>
        <option value="亥">亥 · 登明</option>
      </select>
    </div>
    <div class="field" style="flex:2;min-width:140px"><label>占事</label><input id="zs" placeholder="学业 · 求财 · 婚姻 · 出行"></div>
  </div>
  <div class="btn-row">
    <button class="btn btn-primary" onclick="calc()">起　课</button>
    <button class="btn" onclick="now()">现在时辰</button>
  </div>
</div>

<!-- 结果容器 -->
<div id="result" class="result"></div>

<!-- Footer -->
<div class="footer">
  <div class="name">六壬时课</div>
  <div class="line"></div>
  <p class="desc">大六壬占法 · 四课三传以定吉凶 · 天官神将辨人间祸福</p>
  <p class="desc">本系统纯属学术研究，古法推演，结果仅供参考娱乐</p>
</div>
</div>

<script>
// ========== 基础数据 ==========
const TG=['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'];
const DZ=['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
const DZ_WX={子:'水',丑:'土',寅:'木',卯:'木',辰:'土',巳:'火',午:'火',未:'土',申:'金',酉:'金',戌:'土',亥:'水'};
const DZ_YY={子:'阳',丑:'阴',寅:'阳',卯:'阴',辰:'阳',巳:'阴',午:'阳',未:'阴',申:'阳',酉:'阴',戌:'阳',亥:'阴'};
const DZ_I=Object.fromEntries(DZ.map((z,i)=>[z,i]));
const TG_I=Object.fromEntries(TG.map((g,i)=>[g,i]));
const JIGONG={甲:'寅',乙:'辰',丙:'巳',丁:'未',戊:'巳',己:'未',庚:'申',辛:'戌',壬:'亥',癸:'丑'};
const WXKE={木:['土'],火:['金'],土:['水'],金:['木'],水:['火']};
const YJ_NAME={子:'神后',丑:'大吉',寅:'功曹',卯:'太冲',辰:'天罡',巳:'太乙',午:'胜光',未:'小吉',申:'传送',酉:'从魁',戌:'河魁',亥:'登明'};
const YJ_BOUND=[{md:120,z:'子'},{md:219,z:'亥'},{md:320,z:'戌'},{md:420,z:'酉'},{md:521,z:'申'},{md:621,z:'未'},{md:723,z:'午'},{md:823,z:'巳'},{md:923,z:'辰'},{md:1023,z:'卯'},{md:1122,z:'寅'},{md:1222,z:'丑'}];

const TG_INFO={
  贵人:{五:'土',凶:'吉',说明:'尊神，吉凶枢纽'},
  螣蛇:{五:'火',凶:'凶',说明:'惊疑火光怪异'},
  朱雀:{五:'火',凶:'凶',说明:'文书口舌司讼'},
  六合:{五:'木',凶:'吉',说明:'和合婚姻成就'},
  勾陈:{五:'土',凶:'凶',说明:'词讼争战迟滞'},
  青龙:{五:'木',凶:'大吉',说明:'财帛喜庆亨通'},
  天后:{五:'水',凶:'中',说明:'阴私蔽匿护卫'},
  太阴:{五:'金',凶:'凶',说明:'暗昧奸邪淫乱'},
  玄武:{五:'水',凶:'凶',说明:'盗贼走失遗亡'},
  太常:{五:'土',凶:'吉',说明:'酒食衣冠印绶'},
  白虎:{五:'金',凶:'大凶',说明:'道路血光官灾'},
  天空:{五:'土',凶:'凶',说明:'诈伪不实奏书'},
};
const TG_SHUN=['贵人','螣蛇','朱雀','六合','勾陈','青龙','天后','太阴','玄武','太常','白虎','天空'];
const TG_NI=['贵人','天空','白虎','太常','玄武','太阴','天后','青龙','勾陈','六合','朱雀','螣蛇'];

const TCOL={'贵人':'#d4a853','螣蛇':'#e87a7a','朱雀':'#e87a7a','六合':'#7bcfa8','勾陈':'#e87a7a','青龙':'#7bcfa8','天后':'#d4a853','太阴':'#8b7d6b','玄武':'#8b7d6b','太常':'#7bcfa8','白虎':'#e87a7a','天空':'#8b7d6b'};

function wx(z){return DZ_WX[z]||'土'}
function k_zei(top,bot){let t=WXKE[wx(top)]||[];return t.includes(wx(bot))}
function k_shang(top,bot){return k_zei(top,bot)}
function x_zei(top,bot){return k_zei(bot,top)}

function shi(h){const m={23:'子',0:'子',1:'丑',2:'丑',3:'寅',4:'寅',5:'卯',6:'卯',7:'辰',8:'辰',9:'巳',10:'巳',11:'午',12:'午',13:'未',14:'未',15:'申',16:'申',17:'酉',18:'酉',19:'戌',20:'戌',21:'亥',22:'亥'};return m[h]||'子'}
function day(n){return 5<=n&&n<19?'昼':'夜'}
function gr(gan,dn){const z={'甲':'丑','乙':'子','丙':'亥','丁':'亥','戊':'丑','己':'子','庚':'丑','辛':'午','壬':'巳','癸':'巳'},n={'甲':'未','乙':'申','丙':'酉','丁':'酉','戊':'未','己':'申','庚':'未','辛':'寅','壬':'卯','癸':'卯'};return dn==='昼'?z[gan]:n[gan]}

function gan_zhi(y,m,d){
  let base=new Date(2000,0,1),dt=new Date(y,m-1,d);
  let diff=Math.floor((dt-base)/86400000),idx=diff%60;
  while(idx<0)idx+=60;
  return {g:TG[idx%10],z:DZ[idx%12]};
}

function get_yj(y,m,d){
  if(m===1&&d<20)return '丑';
  if(m===12&&d>=22)return '丑';
  let md=m*100+d,yj='子';
  for(let b of YJ_BOUND){if(md<b.md)break;yj=b.z}
  return yj;
}

function tp(yj,sc){
  let off=(DZ_I[yj]-DZ_I[sc]+12)%12;
  let r={};for(let i=0;i<12;i++)r[DZ[i]]=DZ[(i+off)%12];
  return r;
}

function sike(g,z,tp){
  let gg=JIGONG[g],d1=tp[gg],d2=tp[d1],d3=tp[z],d4=tp[d3];
  return [
    ['一课（日阳）',`${g}寄${gg}`,gg,d1],
    ['二课（日阴）',`${d1}上`,d1,d2],
    ['三课（辰阳）',`${z}上`,z,d3],
    ['四课（辰阴）',`${d3}上`,d3,d4]
  ];
}

function ke_zei(sk,rg){
  let zei=[],ke=[];
  for(let i=0;i<4;i++){
    let bz=sk[i][2],ts=sk[i][3];
    if(x_zei(ts,bz))zei.push({i,bz,ts});
    if(k_shang(ts,bz))ke.push({i,bz,ts});
  }
  if(zei.length===1)return {k:'重审',fy:zei[0].ts,ri:zei[0],ll:`唯一下贼上：${zei[0].bz}贼${zei[0].ts}`};
  if(zei.length>1){
    let yy=TG_I[rg]%2===0?'阳':'阴';
    for(let z of zei){if(DZ_YY[z.ts]===yy)return {k:'比用（知一）',fy:z.ts,ri:z,ll:`比用取${z.ts}`}}
    return {k:'比用（知一）',fy:zei[0].ts,ri:zei[0],ll:`比用取${zei[0].ts}`};
  }
  if(ke.length===1)return {k:'元首',fy:ke[0].ts,ri:ke[0],ll:`唯一上克下`};
  if(ke.length>1){
    let yy=TG_I[rg]%2===0?'阳':'阴';
    for(let k of ke){if(DZ_YY[k.ts]===yy)return {k:'比用',fy:k.ts,ri:k,ll:`比用取${k.ts}`}}
    return {k:'比用',fy:ke[0].ts,ri:ke[0],ll:`比用取${ke[0].ts}`};
  }
  return {k:'重审',fy:'',ri:null,ll:'无克贼'};
}

function sc3(kr,tp){
  if(!kr.fy)return [];
  let c=tp[kr.fy],m=tp[c];
  return [[kr.fy,'初传·发用'],[c,'中传·移易'],[m,'末传·归结']];
}

function gr_order(grg,tp){
  let dp=null;for(let [k,v] of Object.entries(tp)){if(v===grg){dp=k;break}}
  dp=dp||grg;
  return DZ_I[dp]<=DZ_I['辰']?'顺行':'逆行';
}

function tg_pos(tp,grg,ord){
  let dp=null;for(let [k,v] of Object.entries(tp)){if(v===grg){dp=k;break}}
  dp=dp||grg;let idx=DZ_I[dp],list=ord==='顺行'?TG_SHUN:TG_NI;
  let r={};for(let i=0;i<12;i++){
    let pi=(idx+(ord==='顺行'?i:-i)+12)%12;
    r[DZ[pi]]=list[i];
  }
  return r;
}

function kdesc(k){
  const m={
    '元首':'唯一上克下，天地顺轨，百事攸宜。',
    '重审':'下贼上先迷后利，卑下犯上，须详审。',
    '比用（知一）':'二克贼阴阳相争，吉神将福祥双至，凶神将灾祸不单。',
    '比用':'同上',
    '元首(上克下)':'同上'
  };
  return m[k]||'';
}

function jx_cls(jx){return jx==='大吉'||jx==='吉'?'da-ji':jx==='大凶'||jx==='凶'?'xiong':'zhong'}

// ========== 初始化下拉框 ==========
;(function(){
  let n=new Date();
  let ys=document.getElementById('year');
  for(let y=n.getFullYear()-5;y<=n.getFullYear()+5;y++){
    let o=document.createElement('option');o.value=y;o.textContent=y;
    if(y===n.getFullYear())o.selected=true;ys.appendChild(o);
  }
  let ms=document.getElementById('month');
  for(let m=1;m<=12;m++){
    let o=document.createElement('option');o.value=m;o.textContent=m+'月';
    if(m===n.getMonth()+1)o.selected=true;ms.appendChild(o);
  }
  let ds=document.getElementById('day');
  for(let d=1;d<=31;d++){
    let o=document.createElement('option');o.value=d;o.textContent=d+'日';
    if(d===n.getDate())o.selected=true;ds.appendChild(o);
  }
  let hs=document.getElementById('hour');
  const sn='子丑寅卯辰巳午未申酉戌亥';
  for(let h=0;h<=23;h++){
    let o=document.createElement('option');o.value=h;
    o.textContent=h+'时('+sn[Math.floor((h+1)%24/2)]+')';
    if(h===n.getHours())o.selected=true;hs.appendChild(o);
  }
})();

function now(){
  let n=new Date();
  document.getElementById('year').value=n.getFullYear();
  document.getElementById('month').value=n.getMonth()+1;
  document.getElementById('day').value=n.getDate();
  document.getElementById('hour').value=n.getHours();
}

function render(d){
  let h='';

  // 基本信息
  h+=`<div class="info-card fade-in" style="display:block">`;
  h+=`<div class="info-grid">`;
  h+=`<div class="info-tag"><span class="lbl">日期</span><span class="val">${d.y}年${d.m}月${d.d}日</span></div>`;
  h+=`<div class="info-tag"><span class="lbl">时辰</span><span class="val">${d.h}时 · ${d.sc}</span></div>`;
  h+=`<div class="info-tag"><span class="lbl">日干支</span><span class="val">${d.rg}${d.rz}</span></div>`;
  h+=`<div class="info-tag"><span class="lbl">月将</span><span class="val">${d.yj} · ${d.yjn}</span></div>`;
  h+=`<div class="info-tag"><span class="lbl">贵人</span><span class="val">${d.gr}（${d.go}）</span></div>`;
  if(d.zs) h+=`<div class="info-tag"><span class="lbl">占事</span><span class="val">${d.zs}</span></div>`;
  h+=`</div></div>`;

  // 天地盘
  let pos=[['巳','午','未','申'],['辰','','','酉'],['卯','','','戌'],['寅','丑','子','亥']];
  h+=`<div class="tp-card fade-in" style="display:block">`;
  h+=`<h3>天盘 · 地盘</h3>`;
  h+=`<div class="tp-row">`;
  h+=`<div class="tp-box"><div class="tp-label" style="color:#8b7d6b;font-size:11px;margin-bottom:6px">天盘</div><div class="tp-grid">`;
  for(let r=0;r<4;r++){for(let c=0;c<4;c++){let z=pos[r][c];if(!z)h+='<div class="tp-cell bk"></div>';else h+=`<div class="tp-cell tc">${d.tp[z]||''}</div>`}}
  h+=`</div></div>`;
  h+=`<div class="tp-box"><div class="tp-label" style="color:#8b7d6b;font-size:11px;margin-bottom:6px">地盘</div><div class="tp-grid">`;
  for(let r=0;r<4;r++){for(let c=0;c<4;c++){let z=pos[r][c];if(!z)h+='<div class="tp-cell bk"></div>';else h+=`<div class="tp-cell">${z}</div>`}}
  h+=`</div></div></div></div>`;

  // 四课
  h+=`<div class="sk-card fade-in" style="display:block">`;
  h+=`<h3>四课</h3>`;
  h+=`<table class="sk-table"><thead><tr><th>课</th><th>寄宫</th><th>地支</th><th>天盘神</th><th>克贼</th></tr></thead><tbody>`;
  for(let i=0;i<d.sk.length;i++){
    let s=d.sk[i];
    let rel='无克',cls='无';
    if(d.kd[i].zei){rel='⬆ 下贼上';cls='贼'}
    else if(d.kd[i].ke){rel='⬇ 上克下';cls='克'}
    h+=`<tr>
      <td class="课名">${s[0]}</td>
      <td style="color:#8b7d6b;font-size:12px">${s[1]}</td>
      <td class="地支">${s[2]}</td>
      <td class="神将" style="color:${TCOL[d.tgm[s[2]]]||'#a88b5a'}">${d.tgm[s[2]]||''}</td>
      <td><span class="关系 ${cls}">${rel}</span></td>
    </tr>`;
  }
  h+=`</tbody></table></div>`;

  // 三传
  h+=`<div class="sc-card fade-in" style="display:block">`;
  h+=`<div class="sc-header">`;
  h+=`<div class="课体标签">${d.kt}</div>`;
  h+=`<p class="课体说明">${kdesc(d.kt)}</p>`;
  h+=`</div>`;
  h+=`<div class="sc-flow">`;
  for(let i=0;i<d.sc.length;i++){
    let c=d.sc[i][0],lb=d.sc[i][1],tg=d.tgc[i],jx=d.jxc[i],cls=jx_cls(jx);
    if(i>0) h+=`<div class="sc-arrow">→</div>`;
    h+=`<div class="sc-chuan ${cls}">
      <div class="阶段">${lb}</div>
      <div class="地支">${c}</div>
      <div class="神将" style="color:${TCOL[tg]||'#a88b5a'}">${tg}</div>
      <div class="吉凶">${jx}</div>
    </div>`;
  }
  h+=`</div></div>`;

  // 天官全盘
  h+=`<div class="tgm-card fade-in" style="display:block">`;
  h+=`<div class="tgm-toggle" onclick="toggle_tgm(this)"><span class="arr">▶</span>天官全盘分布</div>`;
  h+=`<div class="tgm-content">`;
  h+=`<div class="tgm-pan"><div class="tp-grid">`;
  for(let r=0;r<4;r++){for(let c=0;c<4;c++){let z=pos[r][c];if(!z)h+='<div class="tp-cell bk"></div>';else h+=`<div class="tp-cell tgm-cell" style="color:${TCOL[d.tgm[z]]||'#e8d5a3'}">${d.tgm[z]||''}</div>`}}
  h+=`</div></div></div></div>`;

  // 断课
  h+=`<div class="jx-card fade-in" style="display:block">`;
  h+=`<h3>断课详解</h3>`;
  h+=`<div class="jx-content">`;
  h+=`<span class="jx-label">三传走势</span>\n`;
  h+=`<span class="jx-line">─────────────────────────────────</span>\n`;
  for(let i=0;i<d.sc.length;i++){
    let c=d.sc[i][0],lb=d.sc[i][1],tg=d.tgc[i],jx=d.jxc[i];
    h+=`  ${lb}：${c} 乘 ${tg}（${jx}）— ${TG_INFO[tg]?TG_INFO[tg].说明:''}\n`;
  }
  h+=`\n<span class="jx-label">课体</span><span class="jx-line">  ${d.kt}</span>\n`;
  h+=`<span class="jx-line">  ${kdesc(d.kt)}</span>\n`;
  let jx1=d.jxc[0],jx3=d.jxc[2];
  h+=`\n<span class="jx-label">三传总评</span>\n`;
  h+=`  初传<span class="jx-line">：</span>${jx1==='大吉'||jx1==='吉'?'<span style="color:#7bcfa8">吉神，起步有利</span>':'<span style="color:#e87a7a">凶神，起步有压力</span>'}\n`;
  h+=`  末传<span class="jx-line">：</span>${jx3==='大吉'||jx3==='吉'?'<span style="color:#7bcfa8">吉神，结果看好</span>':'<span style="color:#e87a7a">凶神，结果需谨慎</span>'}\n`;
  h+=`\n<span class="jx-label">基础信息</span>\n`;
  h+=`<span class="jx-line">─────────────────────────────────</span>\n`;
  h+=`  月将<span class="jx-line">：</span>${d.yj}（${d.yjn}）\n`;
  h+=`  占时<span class="jx-line">：</span>${d.sc}时\n`;
  h+=`  日干<span class="jx-line">：</span>${d.rg}${d.rz}，${d.rg}寄${JIGONG[d.rg]}\n`;
  h+=`  贵人<span class="jx-line">：</span>${d.gr}（${d.go}）\n`;
  h+=`\n<span class="jx-label">四课</span><span class="jx-line">（克贼关系）</span>\n`;
  h+=`<span class="jx-line">─────────────────────────────────</span>\n`;
  for(let s of d.sk){
    let rel='';
    for(let j=0;j<d.kd.length;j++){
      if(d.kd[j].zei)rel='⬆ 下贼上';
      else if(d.kd[j].ke)rel='⬇ 上克下';
    }
    h+=`  ${s[0]}：${s[1]} → ${s[2]} 乘 ${d.tgm[s[2]]||''}  <span class="jx-line">${rel||'— 无克'}</span>\n`;
  }
  h+=`\n<span class="jx-label">九宗门</span><span class="jx-line">：</span>${d.kt}\n`;
  h+=`<span class="jx-label">三传</span><span class="jx-line">：</span>`;
  for(let c of d.sc)h+=` ${c[0]}`;
  h+=`\n`;
  h+=`</div></div>`;

  document.getElementById('result').innerHTML=h;
}

function toggle_tgm(el){
  let cont=el.nextElementSibling;
  el.classList.toggle('open');
  cont.classList.toggle('open');
  el.querySelector('.arr').textContent=cont.classList.contains('open')?'▼ ':'▶ ';
}

function calc(){
  let y=parseInt(document.getElementById('year').value);
  let m=parseInt(document.getElementById('month').value);
  let d=parseInt(document.getElementById('day').value);
  let h=parseInt(document.getElementById('hour').value);
  let yjv=document.getElementById('yj').value;
  let zs=document.getElementById('zs').value;

  let sc=shi(h),dn=day(h);
  let {g:rg,z:rz}=gan_zhi(y,m,d);
  let yj=yjv==='auto'?get_yj(y,m,d):yjv;
  let t=tp(yj,sc);
  let sk=sike(rg,rz,t);
  let kr=ke_zei(sk,rg);
  let s=sc3(kr,t);
  let grg=gr(rg,dn);
  let go=gr_order(grg,t);
  let tgm=tg_pos(t,grg,go);

  let kd=[];
  for(let sk2 of sk){
    kd.push({ke:k_shang(sk2[3],sk2[2]),zei:x_zei(sk2[3],sk2[2])});
  }

  let tgc=[],jxc=[];
  for(let c2 of s){
    if(c2[0]){
      let tg=tgm[c2[0]]||'';
      tgc.push(tg);
      jxc.push(TG_INFO[tg]?TG_INFO[tg].凶:'中');
    }
  }

  render({
    y,m,d,h,sc,yj,yjn:YJ_NAME[yj]||'',rg,rz,
    tp:t,sk,kr,kt:kr.k,kd,
    sc:s,gr:grg,go,
    tgm,tgc,jxc,zs
  });
}

// 初始化
calc();
</script>
